<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>drumkits</title>
  <link rel="icon" type="image/x-icon" href="/errors/favicon.ico">
  <link rel="preload" as="image" href="/errors/5f4f96a1224bed852e6e733b23280e7a.png">

  <link rel="stylesheet" href="/base.css">
  <link rel="stylesheet" href="/submit-page/submit-page.css">
</head>

<body>
  <header id="header-placeholder">
    <div class="header-container">
      <div class="logo">
        <a href="/" aria-label="Home">
          <img src="/errors/5f4f96a1224bed852e6e733b23280e7a.png" alt="" width="120" height="40" decoding="async"
            fetchpriority="high" loading="eager">
        </a>
      </div>
      <form class="search-form" action="/search" method="GET">
        <input type="text" name="q" placeholder="Search kits..." class="search-input" required>
        <button type="submit" class="search-btn">Search</button>
      </form>
      <nav class="main-nav">
        <a href="/submit">Submit</a>
        <a href="/">Home</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="submit-page-title">
      <h1>Submit a kit</h1>
      <p>Send a drum kit anonymously here and an admin will review it.</p>
    </div>

    <div class="submit-form-container">
      <form id="submitForm" class="submit-form">
        <div class="form-group">
          <label for="downloadLink">Download Link</label>
          <input type="url" id="downloadLink" name="downloadLink" placeholder="https://example.com/download.zip"
            required pattern="https?://.*">
          <small class="form-help">Enter a direct download link preferably pixeldrain or google drive.</small>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Submit
        </button>
      </form>

      <div id="submitStatus" class="submit-status"></div>
    </div>
  </main>



  <script defer src="/header-loader.js"></script>
  <script defer src="/submit-page/app.js"></script>

  <script defer src="/_vercel/insights/script.js"></script>
</body>

</html>
